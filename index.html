<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الألوان المتغيرة للوضع المظلم والفاتح */
        :root {
            --bg: #1a1a1a;
            --container: #2d2d2d;
            --text: #fff;
            --border: #444;
            --input-bg: #000;
            --wood: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
        }
        body.light-mode {
            --bg: #f0f0f0;
            --container: #ffffff;
            --text: #222;
            --border: #ccc;
            --input-bg: #f9f9f9;
            --wood: none;
        }

        body { background: var(--bg) var(--wood); font-family: 'Cairo', sans-serif; color: var(--text); padding: 20px; transition: background 0.3s, color 0.3s; }
        .container { background: var(--container); border: 4px solid var(--border); border-radius: 20px; padding: 25px; max-width: 800px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); overflow: hidden; transition: 0.3s; }
        
        /* الأنيميشن */
        h1 { color: #ff9800; font-weight: 900; text-align: center; white-space: nowrap; animation: moveTitle 6s linear infinite alternate; margin-bottom: 20px; }
        @keyframes moveTitle { from { transform: translateX(100px); } to { transform: translateX(-100px); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #ff9800; padding: 12px; border-bottom: 2px solid #ff9800; text-align: center; font-size: 18px; }
        td { padding: 15px 5px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
        
        input { width: 70px; background: var(--input-bg); color: #ff9800; border: 1px solid var(--border); text-align: center; padding: 10px; font-size: 20px; border-radius: 5px; font-weight: bold; }
        .name-input { width: 90%; font-size: 16px; color: var(--text); }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Cairo', sans-serif; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        
        .save-btn { background: #2196f3; color: white; }
        .del-btn { background: transparent; color: #f44336; font-size: 22px; padding: 5px; } /* شكل السلة */
        .plus-btn { background: #4caf50; color: white; font-size: 18px; }
        .minus-btn { background: #f44336; color: white; font-size: 18px; }
        .theme-btn { background: #ffb300; color: #000; font-size: 18px; padding: 5px 15px; }
        .logout-btn { background: #555; color: white; }
        
        .hidden { display: none; }
        .time-cell { font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div id="login" class="container" style="max-width:300px; margin-top:100px;">
    <h2 style="text-align:center; color:#ff9800;">دخول المخزن</h2>
    <input type="text" id="user" placeholder="المستخدم" style="width: 85%; margin-bottom:15px; font-size:16px;">
    <input type="password" id="pass" placeholder="المرور" style="width: 85%; margin-bottom:15px; font-size:16px;">
    <button class="btn save-btn" style="width: 100%; padding: 12px; font-size:18px;" onclick="login()">دخول</button>
</div>

<div id="app" class="container hidden">
    <div class="top-bar">
        <button class="btn logout-btn" onclick="logout()">خروج 🚪</button>
        <button class="btn theme-btn" onclick="toggleTheme()">☀️/🌙</button>
    </div>
    
    <h1>مخزن بطاريسو السري ⚙️</h1>
    
    <table>
        <thead>
            <tr>
                <th>الصنف</th>
                <th>الكمية</th>
                <th>آخر تحديث</th>
                <th>إجراء</th>
                <th>مسح</th>
            </tr>
        </thead>
        <tbody id="data-body"></tbody>
        <!-- صف الإضافة المباشر -->
        <tbody>
            <tr>
                <td><input type="text" id="newName" class="name-input" placeholder="اسم الصنف الجديد..."></td>
                <td><input type="number" id="newQty" value="1"></td>
                <td class="time-cell">-</td>
                <td colspan="2"><button class="btn save-btn" style="width:100%; background:#4caf50;" onclick="addRow(this)">إضافة الصنف ➕</button></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymvJvDuyjdH3xz5ltIROuL1dHTVW93Io-oSmNpfnLfOZ2qUmgNlVpS3Gl5GGXpom-g/exec";

    // تفعيل وضع اللايت/دارك
    if(localStorage.getItem("theme") === "light") document.body.classList.add("light-mode");
    function toggleTheme() {
        document.body.classList.toggle("light-mode");
        localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    }

    function login() { localStorage.setItem("in", "1"); location.reload(); }
    function logout() { localStorage.removeItem("in"); location.reload(); }

    window.onload = () => {
        if (localStorage.getItem("in")) {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadData();
        }
    };

    function loadData() {
        fetch(SCRIPT_URL).then(r => r.json()).then(data => {
            const body = document.getElementById('data-body');
            body.innerHTML = "";
            // تخطي الهيدر باستخدام slice(1)
            data.slice(1).forEach((row, i) => {
                const icon = row[0].includes('بطارية') ? '🔋' : '⚙️';
                body.innerHTML += `<tr id="row-${i}">
                    <td style="font-size:18px; font-weight:bold;">${icon} ${row[0]}</td>
                    <td style="white-space: nowrap;">
                        <button class="btn minus-btn" onclick="change(this, -1)">⬇️</button>
                        <input type="number" value="${row[1]}" id="q${i}">
                        <button class="btn plus-btn" onclick="change(this, 1)">⬆️</button>
                    </td>
                    <td class="time-cell" id="time${i}">${row[2] || 'غير محدد'}</td>
                    <td><button class="btn save-btn" onclick="update(${i}, 'q${i}', this)">تحديث</button></td>
                    <td><button class="btn del-btn" onclick="del(${i}, this)">🗑️</button></td>
                </tr>`;
            });
        });
    }

    // زيادة ونقصان الكمية
    function change(btn, val) { 
        let input = btn.parentElement.querySelector('input'); 
        input.value = parseInt(input.value || 0) + val; 
    }

    // تحديث سريع (يغير الواجهة فوراً ويبعت لجوجل في الخلفية)
    function update(i, id, btn) { 
        let newVal = document.getElementById(id).value;
        let timeCell = document.getElementById('time' + i);
        let now = new Date().toLocaleString("ar-EG");
        
        // تعديل الواجهة فوراً
        timeCell.innerText = now;
        let oldText = btn.innerText;
        btn.innerText = "✔️ تم";
        btn.style.background = "#4caf50";
        setTimeout(() => { btn.innerText = oldText; btn.style.background = ""; }, 2000);

        // إرسال (i + 1) عشان نفوت الهيدر في الشيت
        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'update', row: i + 1, qty: newVal}) }); 
    }

    // مسح سريع (يخفي الصف فوراً)
    function del(i, btn) { 
        if(!confirm("متأكد من مسح الصنف؟")) return;
        btn.closest('tr').style.display = 'none';
        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'delete', row: i + 1}) }); 
    }

    // إضافة مباشرة من الجدول
    function addRow(btn) { 
        let name = document.getElementById('newName').value;
        let qty = document.getElementById('newQty').value;
        if(!name) { alert("اكتب اسم الصنف أولاً!"); return; }
        
        btn.innerText = "جاري الإضافة...";
        fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'add', name: name, qty: qty}) })
        .then(() => location.reload()); // بنعمل ريفرش عشان يجيب الداتا الجديدة بالترتيب
    }
</script>
</body>
</html>
