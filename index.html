<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن بطاريسو السري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --wood-bg: #5d4037; --metal-grey: #757575; --grease-black: #212121; }
        body { font-family: 'Cairo', sans-serif; background: #5d4037; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; background: rgba(117, 117, 117, 0.9); padding: 20px; border-radius: 10px; border: 4px solid #3e2723; color: white; margin-bottom: 20px; }
        .login-container, .inventory-container { background: rgba(245, 245, 245, 0.95); padding: 20px; border-radius: 15px; max-width: 500px; margin: 0 auto; border: 2px solid #5d4037; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #757575; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #212121; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>مخزن بطاريسو السري</h1>
</div>

<div id="login-box" class="login-container">
    <h3>دخول الفني</h3>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div id="inventory-box" class="inventory-container hidden">
    <h3>إدارة قطع الغيار</h3>
    <button onclick="logout()" style="background:#b71c1c; margin-bottom:10px;">تسجيل خروج</button>
    <table>
        <thead><tr><th>الصنف</th><th>الكمية</th><th>آخر تحديث</th></tr></thead>
        <tbody id="data-body"><tr><td colspan="3">جاري التحميل...</td></tr></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymvJvDuyjdH3xz5ltIROuL1dHTVW93Io-oSmNpfnLfOZ2qUmgNlVpS3Gl5GGXpom-g/exec";

    window.onload = function() {
        if (localStorage.getItem("isLoggedIn") === "true") {
            showInventory();
        }
    };

    function login() {
        localStorage.setItem("isLoggedIn", "true");
        showInventory();
    }

    function showInventory() {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('inventory-box').classList.remove('hidden');
        fetch(SCRIPT_URL + "?action=getData")
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('data-body');
                tbody.innerHTML = "";
                data.forEach(row => {
                    tbody.innerHTML += `<tr><td>⚙️ ${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`;
                });
            });
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        location.reload();
    }
</script>

</body>
</html>
