
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن بطاريسو السري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-bg: #5d4037;
            --metal-grey: #757575;
            --grease-black: #212121;
            --paper-bg: #f5f5f5;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), #5d4037;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .header {
            text-align: center;
            background: rgba(117, 117, 117, 0.9);
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #3e2723;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            color: white;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px #000;
        }

        .login-container, .inventory-container {
            background: rgba(245, 245, 245, 0.95);
            padding: 20px;
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid #5d4037;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #757575;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #212121;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .icon { font-size: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>مخزن بطاريسو السري</h1>
</div>

<!-- Login Section -->
<div id="login-box" class="login-container">
    <h3>دخول الفني</h3>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<!-- Inventory Section -->
<div id="inventory-box" class="inventory-container hidden">
    <h3>إدارة قطع الغيار</h3>
    <table>
        <thead>
            <tr><th>الصنف</th><th>الكمية</th><th>آخر تحديث</th><th>إجراء</th></tr>
        </thead>
        <tbody id="data-body">
            <!-- Data will be injected here -->
        </tbody>
    </table>
    <button onclick="addRow()" style="margin-top:10px;">إضافة صنف جديد</button>
</div>

<script>
    function login() {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('inventory-box').classList.remove('hidden');
    }
    
    // Logic for CRUD will interact with Google Sheets API here
</script>

</body>
</html>
