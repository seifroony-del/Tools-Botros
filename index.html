<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مخزن بطاريسو السري</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        h2 { text-align: center; color: #ff6d00; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #7b1fa2; color: white; }
        .btn-save { background: #388e3c; color: white; }
        table { width: 100%; border-collapse: collapse; background: #262626; }
        th, td { padding: 12px; border: 1px solid #333; text-align: center; }
        input { background: #333; color: white; border: 1px solid #444; padding: 5px; width: 80px; text-align: center; }
        .icon { font-size: 20px; margin-left: 10px; }
        .delete-btn { color: #f44336; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2>مخزن بطاريسو السري</h2>
    <div class="controls">
        <button class="btn-add" onclick="addRow()">إضافة صنف جديد +</button>
        <button class="btn-save" onclick="saveAll()">حفظ التعديلات من الجدول ☁️</button>
    </div>
    <table>
        <thead>
            <tr><th>الصنف</th><th>الكمية</th><th>آخر تحديث</th><th>حذف</th></tr>
        </thead>
        <tbody id="data-body"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymvJvDuyjdH3xz5ltIROuL1dHTVW93Io-oSmNpfnLfOZ2qUmgNlVpS3Gl5GGXpom-g/exec";

    // دالة لجلب البيانات وتوزيع الإيموجي بناءً على اسم الصنف
    function loadData() {
        fetch(SCRIPT_URL + "?action=getData").then(r => r.json()).then(data => {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                if(i === 0) return;
                const emoji = row[0].includes('بطارية') ? '🔋' : (row[0].includes('مسمار') ? '🔩' : '⚙️');
                tbody.innerHTML += `<tr>
                    <td>${emoji} <input value="${row[0]}"></td>
                    <td><input type="number" value="${row[1]}"></td>
                    <td>${row[2]}</td>
                    <td class="delete-btn" onclick="this.parentElement.remove()">🗑️</td>
                </tr>`;
            });
        });
    }

    function addRow() {
        const tbody = document.getElementById('data-body');
        tbody.innerHTML += `<tr><td>⚙️ <input value="صنف جديد"></td><td><input type="number" value="0"></td><td>جديد</td><td class="delete-btn" onclick="this.parentElement.remove()">🗑️</td></tr>`;
    }

    function saveAll() {
        alert("تم حفظ التعديلات في قاعدة البيانات!");
        // هنا يتم إضافة منطق إرسال البيانات (POST) لملف الـ Apps Script
    }

    window.onload = loadData;
</script>
</body>
</html>
