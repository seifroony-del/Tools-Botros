<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #2b2b2b url('https://www.transparenttextures.com/patterns/wood-pattern.png'); font-family: 'Cairo', sans-serif; color: #eee; padding: 20px; }
        .container { background: #3d3d3d; border: 5px solid #222; border-radius: 15px; padding: 25px; max-width: 800px; margin: auto; box-shadow: 0 10px 30px #000; overflow: hidden; }
        
        /* حركة النص */
        .marquee-box { overflow: hidden; margin-bottom: 20px; }
        h2 { color: #ff9800; text-shadow: 2px 2px 2px #000; font-weight: 900; font-size: 32px; white-space: nowrap; animation: moveText 5s linear infinite alternate; }
        @keyframes moveText { from { transform: translateX(50px); } to { transform: translateX(-50px); } }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #ff9800; padding: 10px; border-bottom: 2px solid #ff9800; }
        td { padding: 12px; border-bottom: 1px solid #555; text-align: center; }
        .qty-btn { padding: 5px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .plus { background: #4caf50; color: white; } .minus { background: #f44336; color: white; }
        input { width: 60px; background: #222; color: #fff; border: 1px solid #777; text-align: center; padding: 8px; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .save-btn { background: #ff9800; color: #000; }
        .out-btn { background: #b71c1c; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-box" class="container">
    <h2>دخول المخزن</h2>
    <input type="text" id="user" placeholder="المستخدم" style="width: 90%; margin-bottom: 10px;">
    <input type="password" id="pass" placeholder="كلمة المرور" style="width: 90%; margin-bottom: 10px;">
    <button class="btn save-btn" onclick="login()">دخول</button>
</div>

<div id="app-box" class="container hidden">
    <div class="marquee-box"><h2>مخزن بطاريسو السري ⚙️</h2></div>
    <div class="top-bar">
        <button class="btn out-btn" onclick="logout()">تسجيل خروج</button>
        <button class="btn save-btn" onclick="saveData()">💾 حفظ الكل</button>
    </div>
    <table>
        <thead><tr><th>الصنف</th><th>الكمية</th><th>آخر تحديث</th></tr></thead>
        <tbody id="data-body"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymvJvDuyjdH3xz5ltIROuL1dHTVW93Io-oSmNpfnLfOZ2qUmgNlVpS3Gl5GGXpom-g/exec";

    window.onload = () => { if (localStorage.getItem("loggedIn")) showApp(); }

    function login() { showApp(); localStorage.setItem("loggedIn", "true"); }
    function logout() { localStorage.removeItem("loggedIn"); location.reload(); }

    function showApp() {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('app-box').classList.remove('hidden');
        loadData();
    }

    function loadData() {
        fetch(SCRIPT_URL).then(r => r.json()).then(data => {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = "";
            data.slice(1).forEach(row => {
                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td>
                    <td><button class="qty-btn minus" onclick="changeQty(this, -1)">-</button>
                        <input type="number" value="${row[1]}" class="qty-val">
                        <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button></td>
                    <td class="time-cell">${row[2]}</td>
                </tr>`;
            });
        });
    }

    function changeQty(btn, val) {
        let input = btn.parentElement.querySelector('.qty-val');
        input.value = parseInt(input.value) + val;
    }

    function saveData() {
        let rows = [];
        document.querySelectorAll('#data-body tr').forEach(tr => {
            rows.push({
                name: tr.cells[0].innerText,
                qty: tr.querySelector('.qty-val').value
            });
        });
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(rows) })
            .then(() => { alert("تم الحفظ!"); location.reload(); });
    }
</script>
</body>
</html>
